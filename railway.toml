[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.docker.txt"

[deploy]
startCommand = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.variables]
CONFIDENCE = "0.30"
IOU = "0.40"
IMG_SIZE = "384"
MODEL_PATH = "backend/models/best.onnx"
FALLBACK_MODEL_PATH = "backend/models/yolov8n.onnx"
OUTPUT_VIDEO_DIR = "backend/outputs"
