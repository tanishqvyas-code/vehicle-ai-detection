version: "3.9"

services:
  vehicleai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vehicleai
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-1}
      - CONFIDENCE=${CONFIDENCE:-0.35}
    volumes:
      # Persist processed output videos so they survive restarts
      - ./backend/outputs:/app/backend/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
