services:
  - type: web
    name: vehicleai-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.docker.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: CONFIDENCE
        value: "0.30"
      - key: IOU
        value: "0.40"
      - key: IMG_SIZE
        value: "640"
      - key: MODEL_PATH
        value: "/opt/render/project/src/backend/models/best.pt"
      - key: FALLBACK_MODEL_PATH
        value: "/opt/render/project/src/backend/models/yolov8n.pt"
      - key: OUTPUT_VIDEO_DIR
        value: "backend/outputs"
    disk:
      name: outputs
      mountPath: /opt/render/project/src/backend/outputs
      sizeGB: 1
